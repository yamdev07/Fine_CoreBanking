global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: accounting-service
    static_configs:
      - targets: ["accounting-service:8000"]
    metrics_path: /metrics

  - job_name: reporting-service
    static_configs:
      - targets: ["reporting-service:8001"]
    metrics_path: /metrics
