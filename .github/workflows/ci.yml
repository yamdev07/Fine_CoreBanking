name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  # ── Lint — Accounting Service ────────────────────────────────────────────────
  accounting-lint:
    name: Accounting Service — Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: accounting_service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.2

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run ruff (lint)
        run: poetry run ruff check app/ tests/ --output-format=github

      - name: Run ruff (format check)
        run: poetry run ruff format app/ tests/ --check

  # ── Lint — Reporting Service ─────────────────────────────────────────────────
  reporting-lint:
    name: Reporting Service — Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: reporting_service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.2

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run ruff (lint)
        run: poetry run ruff check app/ tests/ --output-format=github

      - name: Run ruff (format check)
        run: poetry run ruff format app/ tests/ --check

  # ── Accounting Service ───────────────────────────────────────────────────────
  accounting-tests:
    needs: accounting-lint
    name: Accounting Service — Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: accounting_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: accounting_service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.2

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run unit tests
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/accounting_test"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET_KEY: "test-secret-key-for-ci-only"
          ENVIRONMENT: "development"
        run: poetry run pytest tests/ -v --tb=short --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: accounting_service/coverage.xml
          flags: accounting
        continue-on-error: true

  # ── Alembic migrations check ─────────────────────────────────────────────────
  accounting-migrations:
    name: Accounting Service — Migrations
    runs-on: ubuntu-latest
    needs: accounting-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: accounting_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: accounting_service

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry==1.8.2
      - name: Install dependencies
        run: poetry install --only main
      - name: Run alembic upgrade
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/accounting_test"
          JWT_SECRET_KEY: "test-secret-for-ci"
          ENVIRONMENT: "development"
        run: poetry run alembic upgrade head
      - name: Check no pending migrations
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/accounting_test"
          JWT_SECRET_KEY: "test-secret-for-ci"
          ENVIRONMENT: "development"
        run: |
          PENDING=$(poetry run alembic current 2>&1)
          echo "$PENDING"
          # Fail if current revision doesn't match head
          poetry run alembic check

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build & Type Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run type-check || npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_ACCOUNTING_URL: "http://localhost:8000"
          NEXT_PUBLIC_REPORTING_URL: "http://localhost:8001"
        run: npm run build

  # ── Docker build smoke test ───────────────────────────────────────────────────
  docker-build:
    name: Docker — Build images
    runs-on: ubuntu-latest
    needs: [accounting-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build accounting-service image
        uses: docker/build-push-action@v5
        with:
          context: ./accounting_service
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build reporting-service image
        uses: docker/build-push-action@v5
        with:
          context: ./reporting_service
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          build-args: |
            NEXT_PUBLIC_ACCOUNTING_URL=http://localhost:8000
            NEXT_PUBLIC_REPORTING_URL=http://localhost:8001
          cache-from: type=gha
          cache-to: type=gha,mode=max
